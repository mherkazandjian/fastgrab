name: test

on:
  push:
  pull_request:

jobs:
  x11:
    name: x11 (xvfb + libX11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run X11 unit + integration tests
        run: docker compose run --rm test

  wayland:
    name: wayland (wlr-screencopy via cage)
    runs-on: ubuntu-latest
    # Headless wlroots can be flaky in CI — fail-soft initially. Drop this
    # once the job's pass-rate is steady.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run wlr-screencopy integration tests
        run: docker compose run --rm test-wayland
